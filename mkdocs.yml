site_name: Repo-Guardian
theme:
  name: material
  palette:
    primary: indigo
    accent: amber

nav:
  - Home: index.md
  - User Guide:
    - Installation: user-guide/installation.md
    - Quick Start: user-guide/quick-start.md
    - Commands: user-guide/commands.md
  - Architecture:
    - Overview: architecture/overview.md
    - DAG: architecture/dag.md
    - Object Scanner: architecture/object-scanner.md
    - Jaro-Winkler Detection: architecture/jw-detection.md
  - Benchmarks: benchmarks.md
  - API Reference: api.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.emoji
  - admonition
  - footnotes

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          selection:
            docstring_style: google
