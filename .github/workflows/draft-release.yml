name: Release Drafter

on:
  push:
    tags:
      - 'v*'

jobs:
  draft:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # We need full history for tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: |
          pytest -n auto --cov=guardian

      - name: Export sample graph
        run: |
          mkdir -p artifacts
          # Export a graph from the repo itself
          guardian export-graph --repo . --out artifacts/repo-graph.graphml

      - name: Draft release
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repo-graph
          path: artifacts/
