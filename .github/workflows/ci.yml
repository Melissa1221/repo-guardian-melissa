name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      
      - name: Lint with ruff
        run: |
          ruff src tests --quiet
      
      - name: Test with pytest
        run: |
          pytest -n auto --cov=guardian
      
      - name: Run BDD tests
        run: |
          behave -f progress 